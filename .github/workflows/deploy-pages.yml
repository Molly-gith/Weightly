name: Deploy Pages

# 把仓库里的静态原型页发布到 GitHub Pages。
# 生效前提:仓库 Settings → Pages → Source 选择 “GitHub Actions”。
on:
  push:
    branches: [main, claude/weightly-planning-review-owy5pa]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # 直接发布仓库根目录:index.html 会重定向到 showcase/,
          # showcase/ 是原型展示页,prototype/ 是各版本原型。
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
